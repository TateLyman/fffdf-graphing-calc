<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Graphing Calculator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100%; height: 100%; overflow: hidden; }
  #boot-error {
    display: none;
    font: 15px/1.5 system-ui, sans-serif;
    padding: 20px;
    max-width: 42rem;
    color: #111;
    background: #fff3f3;
    border: 1px solid #e88;
  }
  #boot-error h1 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  #boot-error code { font-size: 0.9em; background: #fee; padding: 0 4px; }
  #boot-error pre { margin-top: 10px; white-space: pre-wrap; word-break: break-word; background: #fff; padding: 10px; border: 1px solid #ddd; }
  #layout {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    min-height: 100vh;
  }
  /*
   * Blends with Desmos embed chrome (gray list / toolbar tone — not a separate “card”).
   */
  .exact-strip {
    --dcg-bg: #ebebeb;
    --dcg-edge: #d4d4d4;
    --dcg-text: rgba(0, 0, 0, 0.42);
    --dcg-muted: rgba(0, 0, 0, 0.28);
    flex: 0 0 auto;
    position: relative;
    z-index: 5;
    margin: 0;
    padding: 4px 8px 5px;
    border-bottom: 1px solid var(--dcg-edge);
    background: var(--dcg-bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .exact-strip:hover {
    background: #e8e8e8;
  }
  .exact-strip:focus-within {
    background: #ececec;
    border-bottom-color: #c9c9c9;
  }
  #exact-input {
    display: block;
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 4px 6px 4px 8px;
    min-height: 22px;
    font-size: 12px;
    line-height: 1.3;
    letter-spacing: 0.01em;
    border: 1px solid #d0d0d0;
    border-radius: 3px;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.65);
    background: linear-gradient(180deg, #f6f6f6 0%, #ececec 100%);
    color: var(--dcg-text);
    outline: none;
    caret-color: rgba(0, 0, 0, 0.45);
  }
  #exact-input::placeholder {
    color: rgba(0, 0, 0, 0.22);
    font-size: 10px;
  }
  #exact-input:hover {
    border-color: #c4c4c4;
    background: linear-gradient(180deg, #f8f8f8 0%, #eeeeee 100%);
  }
  .exact-strip:focus-within #exact-input {
    border-color: #b8b8b8;
    background: #f5f5f5;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
    color: rgba(0, 0, 0, 0.55);
  }
  #exact-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(20, 20, 20, 0.38);
    background: none;
    border: none;
    border-radius: 0;
    font-family: ui-sans-serif, system-ui, sans-serif;
    line-height: 1.2;
    word-break: break-word;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease, margin 0.2s ease, font-size 0.2s ease;
  }
  .exact-strip:focus-within #exact-display,
  #exact-display.has-value {
    margin-top: 4px;
    margin-bottom: 0;
    opacity: 0.55;
    max-height: 5rem;
    padding: 2px 2px 1px 8px;
    font-size: 11px;
    font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    letter-spacing: 0.03em;
    color: var(--dcg-muted);
    line-height: 1.3;
  }
  #exact-display.has-value {
    opacity: 0.62;
    color: rgba(0, 0, 0, 0.34);
  }
  #exact-display .exact-main {
    word-break: break-word;
  }
  #exact-display .asymptote-secondary {
    margin-top: 3px;
    padding-top: 2px;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(0, 0, 0, 0.4);
    word-break: break-word;
  }
  #terminal-ray-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease, margin 0.2s ease;
  }
  .exact-strip:focus-within #terminal-ray-display,
  #terminal-ray-display.has-value {
    margin-top: 4px;
    opacity: 0.62;
    max-height: 5rem;
    padding: 2px 2px 1px 8px;
    font-size: 11px;
    line-height: 1.35;
    color: var(--dcg-muted);
  }
  #terminal-ray-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #terminal-ray-display .tr-line {
    word-break: break-word;
  }
  #exact-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  .exact-strip:focus-within #exact-display.empty {
    opacity: 0.22;
    max-height: 1rem;
    font-size: 10px;
    color: rgba(0, 0, 0, 0.18);
  }
  #calculator {
    flex: 1;
    min-height: 0;
    width: 100%;
  }
  #assist-shell.is-hidden {
    display: none;
  }
  .assist-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }
  #assist-mode {
    font-size: 11px;
    padding: 3px 8px;
    max-width: 100%;
    border: 1px solid #c8c8c8;
    border-radius: 3px;
    background: #f8f8f8;
    color: rgba(0, 0, 0, 0.55);
    cursor: pointer;
  }
  .assist-sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .assist-panel:not(.is-active) {
    display: none !important;
  }
  #roc-input {
    display: block;
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 4px 6px 4px 8px;
    min-height: 36px;
    font-size: 12px;
    line-height: 1.35;
    letter-spacing: 0.01em;
    border: 1px solid #d0d0d0;
    border-radius: 3px;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.65);
    background: linear-gradient(180deg, #f6f6f6 0%, #ececec 100%);
    color: var(--dcg-text);
    outline: none;
    caret-color: rgba(0, 0, 0, 0.45);
    resize: vertical;
    font-family: inherit;
  }
  #roc-input::placeholder {
    color: rgba(0, 0, 0, 0.22);
    font-size: 10px;
  }
  #roc-input:hover {
    border-color: #c4c4c4;
    background: linear-gradient(180deg, #f8f8f8 0%, #eeeeee 100%);
  }
  .exact-strip:focus-within #roc-input {
    border-color: #b8b8b8;
    background: #f5f5f5;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
    color: rgba(0, 0, 0, 0.55);
  }
  #graph-trig-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #graph-trig-display,
  #graph-trig-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 8rem;
    overflow: auto;
  }
  #graph-trig-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #graph-trig-display .gt-line {
    word-break: break-word;
  }
  #trig-eq-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #trig-eq-display,
  #trig-eq-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 8rem;
    overflow: auto;
  }
  #trig-eq-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #trig-eq-display .gt-line {
    word-break: break-word;
  }
  #trig-ineq-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #trig-ineq-display,
  #trig-ineq-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 9rem;
    overflow: auto;
  }
  #trig-ineq-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #trig-ineq-display .gt-line {
    word-break: break-word;
  }
  #trig-id-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #trig-id-display,
  #trig-id-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 8rem;
    overflow: auto;
  }
  #trig-id-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #trig-id-display .gt-line {
    word-break: break-word;
  }
  #sum-diff-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #sum-diff-display,
  #sum-diff-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 8rem;
    overflow: auto;
  }
  #sum-diff-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #sum-diff-display .gt-line {
    word-break: break-word;
  }
  #polar-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #polar-display,
  #polar-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 8rem;
    overflow: auto;
  }
  #polar-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #polar-display .gt-line {
    word-break: break-word;
  }
  #roc-display {
    margin: 0;
    padding: 0;
    min-height: 0;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.2s ease, max-height 0.28s ease;
  }
  .exact-strip:focus-within #roc-display,
  #roc-display.has-value {
    margin-top: 4px;
    padding: 2px 2px 1px 8px;
    font-size: 10px;
    line-height: 1.35;
    color: var(--dcg-muted);
    opacity: 0.62;
    max-height: 10rem;
    overflow: auto;
  }
  #roc-display.empty:not(.has-value) {
    opacity: 0;
    max-height: 0;
    margin: 0;
    padding: 0;
  }
  #roc-display .gt-line {
    word-break: break-word;
  }
  .graph-trig-restriction-input {
    display: block;
    width: 100%;
    margin-top: 4px;
    box-sizing: border-box;
  }
  #assist-dock {
    position: fixed;
    top: 6px;
    left: 8px;
    z-index: 10001;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  #assist-dock-hit {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: none;
    padding: 0;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.12);
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  #assist-dock-hit:hover,
  #assist-dock:hover #assist-dock-hit,
  #assist-dock:focus-within #assist-dock-hit {
    opacity: 0.55;
    background: rgba(0, 0, 0, 0.2);
  }
  #assist-dock-panel {
    display: none;
    flex-direction: column;
    gap: 3px;
    padding: 6px 8px;
    border-radius: 4px;
    background: rgba(250, 250, 250, 0.96);
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #assist-dock:hover #assist-dock-panel,
  #assist-dock:focus-within #assist-dock-panel {
    display: flex;
  }
  #assist-dock-panel button {
    min-width: 7rem;
    padding: 4px 8px;
    font-size: 11px;
    text-align: left;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #f5f5f5;
    cursor: pointer;
  }
  #assist-dock-panel button:hover {
    background: #eaeaea;
  }
  /* Panic is for deployed demos; hide on real localhost so dev layout stays predictable */
  html.localhost-no-panic #assist-dock-panel button[data-action="panic"] {
    display: none !important;
  }
  /*
   * Looks like stray UI chrome; hover shows creator notes. Others rarely notice "···".
   */
  #creator-rail {
    position: fixed;
    right: 0;
    bottom: 0;
    z-index: 9999;
    max-width: min(100%, 22rem);
    padding: 4px 10px 6px 12px;
    font-size: 9px;
    line-height: 1.35;
    letter-spacing: 0.02em;
    color: rgba(118, 118, 118, 0.2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: right;
    pointer-events: auto;
    cursor: default;
    transition: color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }
  #creator-rail:hover,
  #creator-rail:focus-within {
    color: rgba(35, 35, 35, 0.82);
    background: rgba(255, 255, 255, 0.94);
    box-shadow: 0 -1px 0 rgba(0, 0, 0, 0.07);
  }
  #creator-rail .creator-rail__hint {
    user-select: none;
  }
  #creator-rail .creator-rail__full {
    display: none;
    user-select: text;
  }
  #creator-rail:hover .creator-rail__hint,
  #creator-rail:focus-within .creator-rail__hint {
    display: none;
  }
  #creator-rail:hover .creator-rail__full,
  #creator-rail:focus-within .creator-rail__full {
    display: inline;
  }
</style>

<body>
<div id="boot-error" role="alert"></div>
<div id="layout">
  <div id="assist-shell" class="exact-strip">
    <div class="assist-toolbar">
      <label for="assist-mode" class="assist-sr-only">Assist tool</label>
      <select id="assist-mode" aria-label="Choose assist tool type">
        <option value="exact">Exact value &amp; asymptotes</option>
        <option value="ray">Terminal ray</option>
        <option value="graph">Graph trig</option>
        <option value="treq">Trig equation</option>
        <option value="tineq">Trig inequality</option>
        <option value="tid">Trig identity</option>
        <option value="sumd">Sum / difference</option>
        <option value="polar">Polar</option>
        <option value="roc">Polar rate of change</option>
      </select>
    </div>
    <div class="assist-panel is-active" data-mode="exact" id="panel-exact">
      <input id="exact-input" type="text" placeholder="Type here (not in the graph list): tan(x/6), sin(pi/4)…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Expression for exact value and asymptotes" />
      <div id="exact-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="ray" id="panel-ray">
      <input id="terminal-ray-input" type="text" placeholder="Angle θ (radians): 7pi/4, -pi/6…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Terminal ray angle" />
      <div id="terminal-ray-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="graph" id="panel-graph">
      <input id="graph-trig-input" type="text" placeholder="Graph + analyze: 3sin^-1(-x)+pi/2, 2csc(x+pi/2)-1, arctan(x-2)+pi/4…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Graph trig function" />
      <input id="graph-trig-restriction" type="text" placeholder="Restriction: [-pi/2, pi/2] or -pi/2&lt;=x&lt;=pi/2" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Domain restriction for inverse of sin, cos, or tan" class="graph-trig-restriction-input" />
      <div id="graph-trig-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="treq" id="panel-treq">
      <input id="trig-eq-input" type="text" placeholder="Trig equation: 2sin(x)+5=4, cos^2(x)+cos(x)=0, sin(x)=0 and cos(x)=0…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Trig equation to solve" />
      <input id="trig-eq-interval" type="text" placeholder="Interval: [0, 2pi] or all" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Solution interval" class="graph-trig-restriction-input" />
      <div id="trig-eq-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="tineq" id="panel-tineq">
      <input id="trig-ineq-input" type="text" placeholder="Trig inequality: 4sin(x)+1 &lt;= -1, cos(x) &gt;= 1/2…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Trig inequality to solve" />
      <input id="trig-ineq-interval" type="text" placeholder="Interval: [0, 2pi]" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Inequality solution interval" class="graph-trig-restriction-input" />
      <div id="trig-ineq-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="tid" id="panel-tid">
      <input id="trig-id-input" type="text" placeholder="Trig identity simplify: cos^2(x)sec(x), (1-sin^2(x))csc^2(x), tan(x)/sin(x)…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Trig expression to simplify" />
      <div id="trig-id-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="sumd" id="panel-sumd">
      <input id="sum-diff-input" type="text" placeholder="Sum/difference: sin(3pi/4 - 5pi/6), sin(x - 4pi/3), cos(3pi/2 + x)…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Trig sum or difference to expand" />
      <div id="sum-diff-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="polar" id="panel-polar">
      <input id="polar-input" type="text" placeholder="Polar mode: r = 1+cos(theta), (4, 5pi/6), (2, -4), -3-5i, 6[cos(3pi/4)+i·sin(3pi/4)]…" inputmode="text" autocomplete="off" spellcheck="false" aria-label="Polar equation or coordinate conversion" />
      <div id="polar-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
    <div class="assist-panel" data-mode="roc" id="panel-roc">
      <textarea id="roc-input" rows="2" placeholder="Polar AROC: pi/8, -1.41, 3pi/8, -1.41 — or label: theta1=pi/8, r1=-1.41, … · optional line: estimate: pi/4" autocomplete="off" spellcheck="false" aria-label="Polar average rate of change from two table points"></textarea>
      <div id="roc-display" class="empty" aria-live="polite" aria-hidden="true"></div>
    </div>
  </div>
  <div id="calculator"></div>
</div>
<div id="assist-dock">
  <button type="button" id="assist-dock-hit" tabindex="0" aria-label="Assist tools: hover for E R G Q U I D O T, Panic is ⌘⇧ backslash" title="Assist: E · R · G · Q · U · I · D · O · T · Panic ⌘⇧ backslash"></button>
  <div id="assist-dock-panel" role="menu">
    <button type="button" data-action="exact" title="⌘⇧E">Exact row (E)</button>
    <button type="button" data-action="ray" title="⌘⇧R">Terminal ray (R)</button>
    <button type="button" data-action="graph" title="⌘⇧G">Graph trig (G)</button>
    <button type="button" data-action="treq" title="⌘⇧Q">Trig equation (Q)</button>

      else p.classList.remove('is-active');

    if (persist !== false) {

      } catch (ignore) {}

  function applyAssistShellHidden(shouldHide) {
    if (!assistShell) return;

              ? trigEqIn
              : mode === 'tineq'

                : mode === 'tid'
                  ? trigIdIn
                  : mode === 'sumd'
                    ? sumDiffIn
                    : mode === 'polar'
                      ? polarIn
                      : mode === 'roc'
                        ? rocIn
                        : null;
    if (el) {
      requestAnimationFrame(function () {
        try {
          el.focus();
        } catch (e2) {}
      });
    }
  }

  function toggleAssistMode(mode, calculator, relayout) {
    if (!assistShell || !assistModeSelect) return;
    var visible = !assistShell.classList.contains('is-hidden');
    var same = visible && assistModeSelect.value === mode;
    if (same) {
      applyAssistShellHidden(true);
      try {
        localStorage.setItem('assistShellHidden', '1');
      } catch (ignore) {}
      try {
        if (exactIn) exactIn.blur();
        if (terminalRayIn) terminalRayIn.blur();
        if (graphTrigIn) graphTrigIn.blur();
        if (graphTrigRestriction) graphTrigRestriction.blur();
        if (trigEqIn) trigEqIn.blur();
        if (trigEqInterval) trigEqInterval.blur();
        if (trigIneqIn) trigIneqIn.blur();
        if (trigIneqInterval) trigIneqInterval.blur();
        if (trigIdIn) trigIdIn.blur();
        if (sumDiffIn) sumDiffIn.blur();
        if (polarIn) polarIn.blur();
        if (rocIn) rocIn.blur();
      } catch (ignore) {}
    } else {
      setAssistMode(mode);
      applyAssistShellHidden(false);
      try {
        localStorage.setItem('assistShellHidden', '0');
      } catch (ignore) {}
      focusAssistInput(mode);
    }
    relayout();
    setTimeout(relayout, 50);
    setTimeout(relayout, 200);
  }

  try {
    var am = localStorage.getItem('assistMode') || 'exact';
    setAssistMode(am, false);
    applyAssistShellHidden(localStorage.getItem('assistShellHidden') === '1');

  function toggleExactStrip(calculator, relayout) {

  function installExactStripHotkey(calculator, relayout) {

        if (e.key !== 'e' && e.key !== 'E') return;
        var cmdShiftE = e.metaKey && e.shiftKey && !e.altKey && !e.ctrlKey;
        var ctrlOptE = e.ctrlKey && e.altKey && !e.metaKey && !e.shiftKey;
        if (!cmdShiftE && !ctrlOptE) return;
        e.preventDefault();
        e.stopPropagation();
        toggleExactStrip(calculator, relayout);
      },
      true
    );
  }

  function showError(title, detail) {

      '<p>If you mapped <code>desmos.com</code> in <code>/etc/hosts</code> to this machine, remove that line and use a different hostname (for example <code>calc.local</code> with <code>127.0.0.1 calc.local</code> plus mkcert) so traffic to the real <code>desmos.com</code> is not accidentally sent to this dev server.</p>' +
      '<p>The public trial API key is often limited to <code>localhost</code>. If the calculator stays blank with no error, open the browser console (F12). You may need your own key from <a href="https://www.desmos.com/my-api">desmos.com/my-api</a> and add your page origin there.</p>';
    if (detail) {
      var pre = document.createElement('pre');
      pre.textContent = String(detail);
      errBox.appendChild(pre);
    }
  }

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onload = function () { resolve(); };
      s.onerror = function () { reject(new Error('Failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }

  /** Bump if you change local JS and the browser keeps old copies. */
  var LOCAL_JS_QUERY = 'v=24';

  var exactEvaluate = null;
  var asymptoteApi = null;
  var terminalRayApi = null;

  var GRAPH_TRIG_EXPR_ID = 'fff-graph-trig';
  var TRIG_FUNC_INV_ORIG_ID = 'fff-trig-inv-f';
  var TRIG_FUNC_INV_INV_ID = 'fff-trig-inv-f1';
  var TRIG_FUNC_INV_YX_ID = 'fff-trig-inv-yx';
  var TRIG_EQ_LEFT_ID = 'fff-trig-eq-l';
  var TRIG_EQ_RIGHT_ID = 'fff-trig-eq-r';
  var TRIG_EQ_PT_PREFIX = 'fff-trig-eq-p';
  var TRIG_EQ_MAX_PTS = 8;
  var TRIG_ID_ORIG_ID = 'fff-trig-id-o';
  var TRIG_ID_SIMP_ID = 'fff-trig-id-s';
  var SUM_DIFF_ORIG_ID = 'fff-sum-diff-o';
  var SUM_DIFF_SIMP_ID = 'fff-sum-diff-s';
  var POLAR_EXPR_A = 'fff-polar-a';
  var POLAR_EXPR_B = 'fff-polar-b';
  var TRIG_INEQ_Y1 = 'fff-tineq-y1';
  var TRIG_INEQ_Y2 = 'fff-tineq-y2';
  var TRIG_INEQ_SHADE = 'fff-tineq-shade';

  function setGraphViewport(calc) {
    if (!calc || typeof calc.setMathBounds !== 'function') return;
    try {
      calc.setMathBounds({
        left: -2 * Math.PI,
        right: 2 * Math.PI,
        bottom: -8,
        top: 8
      });
    } catch (ignore) {}
  }

  function setGraphViewportInverse(calc) {
    if (!calc || typeof calc.setMathBounds !== 'function') return;
    try {
      calc.setMathBounds({
        left: -4,
        right: 4,
        bottom: -8,
        top: 8
      });
    } catch (ignore) {}
  }

  function setGraphViewportTrigFuncInverse(calc) {
    if (!calc || typeof calc.setMathBounds !== 'function') return;
    try {
      calc.setMathBounds({
        left: -8,
        right: 8,
        bottom: -8,
        top: 8
      });
    } catch (ignore) {}
  }

  function clearGraphTrigDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;
    [
      GRAPH_TRIG_EXPR_ID,
      TRIG_FUNC_INV_ORIG_ID,
      TRIG_FUNC_INV_INV_ID,
      TRIG_FUNC_INV_YX_ID
    ].forEach(function (id) {
      try {
        calc.removeExpression({ id: id });
      } catch (ignore) {}
    });
  }

  function syncGraphTrigDesmos(calc, raw, restriction) {
    if (!calc || !graphTrigApi) return;
    var t = String(raw).trim();
    var rest = restriction != null ? String(restriction).trim() : '';
    if (!t) {
      clearGraphTrigDesmos(calc);
      return;
    }
    clearGraphTrigDesmos(calc);
    var r;
    try {
      r = graphTrigApi.graphTrigAnalyze(t, rest);
    } catch (e) {
      return;
    }
    try {
      if (r && r.analysisKind === 'trigFuncInverse') {
        calc.setExpression({ id: TRIG_FUNC_INV_ORIG_ID, latex: r.desmosOriginal });
        calc.setExpression({ id: TRIG_FUNC_INV_INV_ID, latex: r.desmosInverse });
        calc.setExpression({ id: TRIG_FUNC_INV_YX_ID, latex: r.desmosYx });
        setGraphViewportTrigFuncInverse(calc);
        return;
      }
      if (!r || !r.desmos) {
        return;
      }
      calc.setExpression({ id: GRAPH_TRIG_EXPR_ID, latex: r.desmos });
      if (r.analysisKind === 'inverse') setGraphViewportInverse(calc);
      else setGraphViewport(calc);
    } catch (ignore) {}
  }

  function clearTrigEqDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;
    var ids = [TRIG_EQ_LEFT_ID, TRIG_EQ_RIGHT_ID];
    var i;
    for (i = 0; i < TRIG_EQ_MAX_PTS; i++) {
      ids.push(TRIG_EQ_PT_PREFIX + i);
    }
    ids.forEach(function (id) {
      try {
        calc.removeExpression({ id: id });
      } catch (ignore) {}
    });
  }

  function setGraphViewportTrigEq(calc) {
    if (!calc || typeof calc.setMathBounds !== 'function') return;
    try {
      calc.setMathBounds({
        left: -0.8,
        right: 2 * Math.PI + 0.5,
        bottom: -8,
        top: 8
      });
    } catch (ignore) {}
  }

  function clearTrigIdentityDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;
    [TRIG_ID_ORIG_ID, TRIG_ID_SIMP_ID].forEach(function (id) {
      try {
        calc.removeExpression({ id: id });
      } catch (ignore) {}
    });
  }

  function syncTrigIdentityDesmos(calc, res) {
    if (!calc || !res || !res.desmosOriginalLatex || !res.desmosSimplifiedLatex) return;
    clearTrigIdentityDesmos(calc);
    try {
      var lo = { id: TRIG_ID_ORIG_ID, latex: res.desmosOriginalLatex };
      var rs = { id: TRIG_ID_SIMP_ID, latex: res.desmosSimplifiedLatex };
      if (typeof Desmos !== 'undefined' && Desmos.Colors) {
        lo.color = Desmos.Colors.BLUE;
        rs.color = Desmos.Colors.ORANGE;
      }
      calc.setExpression(lo);
      calc.setExpression(rs);
      setGraphViewport(calc);
    } catch (ignore) {}
  }

  function clearSumDiffDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;

        calc.removeExpression({ id: id });

  function syncSumDiffDesmos(calc, res) {
    if (!calc || !res || !res.desmosOriginalLatex || !res.desmosSimplifiedLatex) return;
    clearSumDiffDesmos(calc);
    try {
      var lo = { id: SUM_DIFF_ORIG_ID, latex: res.desmosOriginalLatex };
      var rs = { id: SUM_DIFF_SIMP_ID, latex: res.desmosSimplifiedLatex };
      if (typeof Desmos !== 'undefined' && Desmos.Colors) {
        lo.color = Desmos.Colors.BLUE;
        rs.color = Desmos.Colors.ORANGE;
      }
      calc.setExpression(lo);
      calc.setExpression(rs);
      setGraphViewport(calc);
    } catch (ignore) {}
  }

  function clearPolarDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;
    [POLAR_EXPR_A, POLAR_EXPR_B].forEach(function (id) {
      try {
        calc.removeExpression({ id: id });
      } catch (ignore) {}
    });
  }

  function syncPolarDesmos(calc, pa) {
    if (!calc || !pa || !pa.matched) return;
    clearPolarDesmos(calc);
    try {
      if (pa.subtype === 'polar_equation' && pa.desmosParametric) {
        var pe = { id: POLAR_EXPR_A, latex: pa.desmosParametric };
        if (typeof Desmos !== 'undefined' && Desmos.Colors) {
          pe.color = Desmos.Colors.BLUE;
        }
        calc.setExpression(pe);
        setGraphViewport(calc);
        return;
      }
      if (pa.desmosA) {
        var la = { id: POLAR_EXPR_A, latex: pa.desmosA };
        if (typeof Desmos !== 'undefined' && Desmos.Colors) {
          la.color = Desmos.Colors.BLUE;
        }
        calc.setExpression(la);
      }
      if (pa.desmosB) {
        var lb = { id: POLAR_EXPR_B, latex: pa.desmosB };
        if (typeof Desmos !== 'undefined' && Desmos.Colors) {
          lb.color = Desmos.Colors.ORANGE;
        }
        calc.setExpression(lb);
      }
      setGraphViewport(calc);
    } catch (ignore) {}
  }

  function syncTrigEqDesmos(calc, res) {
    if (!calc || !res || !res.desmosLeft || !res.desmosRight) return;
    clearTrigEqDesmos(calc);
    try {
      var ln = { id: TRIG_EQ_LEFT_ID, latex: res.desmosLeft };
      var rn = { id: TRIG_EQ_RIGHT_ID, latex: res.desmosRight };
      if (typeof Desmos !== 'undefined' && Desmos.Colors) {
        ln.color = Desmos.Colors.BLUE;
        rn.color = Desmos.Colors.ORANGE;
      }
      calc.setExpression(ln);
      calc.setExpression(rn);
      var pts = res.desmosPointsLatex;
      if (pts && pts.length) {
        var pi;
        for (pi = 0; pi < pts.length && pi < TRIG_EQ_MAX_PTS; pi++) {
          var pt = { id: TRIG_EQ_PT_PREFIX + pi, latex: pts[pi], showLabel: false };
          if (typeof Desmos !== 'undefined' && Desmos.Colors) {
            pt.color = Desmos.Colors.BLACK;
          }
          calc.setExpression(pt);
        }
      }
      setGraphViewportTrigEq(calc);
    } catch (ignore) {}
  }

  function updateTrigEqView() {
    if (!trigEqOut || !trigEqIn) return;
    while (trigEqOut.firstChild) {
      trigEqOut.removeChild(trigEqOut.firstChild);
    }
    var t = String(trigEqIn.value).trim();
    var intv =
      trigEqInterval && String(trigEqInterval.value).trim()
        ? String(trigEqInterval.value).trim()
        : '[0, 2pi]';
    if (!t) {
      trigEqOut.classList.add('empty');
      trigEqOut.classList.remove('has-value');
      trigEqOut.setAttribute('aria-hidden', 'true');
      clearTrigEqDesmos(graphCalculator);
      return;
    }
    if (!trigEquationApi || typeof trigEquationApi.trigEquationSolve !== 'function') {
      trigEqOut.classList.remove('empty');
      trigEqOut.classList.add('has-value');
      trigEqOut.setAttribute('aria-hidden', 'false');
      var w0 = document.createElement('div');
      w0.className = 'gt-line';
      w0.textContent = 'Loading…';
      trigEqOut.appendChild(w0);
      return;
    }
    var r;
    try {
      r = trigEquationApi.trigEquationSolve(t, intv);
    } catch (e1) {
      r = null;
    }
    trigEqOut.classList.remove('empty');
    trigEqOut.classList.add('has-value');
    trigEqOut.setAttribute('aria-hidden', 'false');
    if (!r || r.solutions === undefined) {
      var er = document.createElement('div');
      er.className = 'gt-line';
      er.textContent =
        'Could not parse (use LHS = RHS, or A and B with two equalities).';
      trigEqOut.appendChild(er);
      clearTrigEqDesmos(graphCalculator);
      return;
    }
    var lines = ['Interval: ' + intv, 'Type: ' + (r.type || '—')];
    if (r.steps && r.steps.length) {
      r.steps.forEach(function (st) {
        lines.push(st);
      });
    }
    lines.push('Solutions: ' + (r.solutions.length ? r.solutions.join(', ') : 'none'));
    lines.push('Desmos: left (blue), right (orange)' + (r.desmosPointsLatex && r.desmosPointsLatex.length ? ', intersections (black dots)' : ''));
    lines.forEach(function (line) {
      var d = document.createElement('div');
      d.className = 'gt-line';
      d.textContent = line;
      trigEqOut.appendChild(d);
    });
    syncTrigEqDesmos(graphCalculator, r);
  }

  function clearTrigIneqDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;
    [TRIG_INEQ_Y1, TRIG_INEQ_Y2, TRIG_INEQ_SHADE].forEach(function (id) {

        calc.removeExpression({ id: id });

  function intervalToDesmosDomain(iv) {
    var s = String(iv || '[0, 2pi]').trim();
    var m = /^\s*\[\s*([^,\]]+)\s*,\s*([^,\]]+)\s*\]\s*$/.exec(s);
    if (!m) return '0\\le x\\le2\\pi';
    function part(p) {
      var t = String(p).replace(/\s+/g, '');
      t = t.replace(/([0-9])pi/gi, '$1\\pi');
      t = t.replace(/^pi/gi, '\\pi');
      return t;
    }

    if (!panel) return;
    panel.addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-action]');
      if (!btn) return;
      var act = btn.getAttribute('data-action');
      if (act === 'exact') toggleExactStrip(calculator, relayout);
      else if (act === 'ray') toggleTerminalRayStrip(calculator, relayout);
      else if (act === 'graph') toggleGraphTrigStrip(calculator, relayout);
      else if (act === 'treq') toggleTrigEqStrip(calculator, relayout);
      else if (act === 'tineq') toggleTrigIneqStrip(calculator, relayout);
      else if (act === 'tid') toggleTrigIdStrip(calculator, relayout);
      else if (act === 'sumd') toggleSumDiffStrip(calculator, relayout);
      else if (act === 'polar') togglePolarStrip(calculator, relayout);
      else if (act === 'roc') toggleRocStrip(calculator, relayout);
      else if (act === 'panic') togglePanicStrips(calculator, relayout);
    });
  }

  var TR_EXPR_IDS = ['fff-tr-a', 'fff-tr-pt', 'fff-tr-ray'];

  function clearTerminalRayDesmos(calc) {
    if (!calc || typeof calc.removeExpression !== 'function') return;
    TR_EXPR_IDS.forEach(function (id) {
      try {
        calc.removeExpression({ id: id });
      } catch (ignore) {}
    });
  }

  function syncTerminalRayDesmos(calc, rawAngle, thetaRad) {
    if (!calc || !rawAngle || !terminalRayApi) return;
    clearTerminalRayDesmos(calc);
    var latex = terminalRayApi.angleExprToDesmosLatex(rawAngle);
    if (!latex) return;
    calc.setExpression({ id: 'fff-tr-a', latex: 'a=' + latex });
    calc.setExpression({ id: 'fff-tr-pt', latex: '(\\cos(a),\\sin(a))' });
    if (thetaRad != null && Math.abs(Math.cos(thetaRad)) < 1e-10) {
      calc.setExpression({ id: 'fff-tr-ray', latex: 'x=0' });
    } else {
      calc.setExpression({ id: 'fff-tr-ray', latex: 'y=x\\tan(a)' });
    }
  }

  function updateTerminalRayView(raw) {
    while (terminalRayOut.firstChild) {
      terminalRayOut.removeChild(terminalRayOut.firstChild);
    }
    var t = String(raw).trim();
    if (!t) {
      terminalRayOut.classList.add('empty');
      terminalRayOut.classList.remove('has-value');
      terminalRayOut.setAttribute('aria-hidden', 'true');
      clearTerminalRayDesmos(graphCalculator);
      return;
    }
    if (!terminalRayApi) {
      terminalRayOut.classList.remove('empty');
      terminalRayOut.classList.add('has-value');
      terminalRayOut.setAttribute('aria-hidden', 'false');
      var w = document.createElement('div');
      w.className = 'tr-line';
      w.textContent = 'Loading…';
      terminalRayOut.appendChild(w);
      return;
    }
    var r;
    try {
      r = terminalRayApi.terminalRayPointSlope(t);
    } catch (e) {
      r = { error: true };
    }
    if (r.error || !r.point) {
      terminalRayOut.classList.remove('empty');
      terminalRayOut.classList.add('has-value');
      terminalRayOut.setAttribute('aria-hidden', 'false');
      var err = document.createElement('div');
      err.className = 'tr-line';
      err.textContent = 'Use a standard grid angle (multiple of π/12), e.g. 7pi/4';
      terminalRayOut.appendChild(err);
      clearTerminalRayDesmos(graphCalculator);
      return;
    }
    terminalRayOut.classList.remove('empty');
    terminalRayOut.classList.add('has-value');
    terminalRayOut.setAttribute('aria-hidden', 'false');
    var p1 = document.createElement('div');
    p1.className = 'tr-line';
    p1.textContent = 'Point (cos θ, sin θ): ' + r.point;
    var p2 = document.createElement('div');
    p2.className = 'tr-line';
    p2.textContent = 'Slope tan θ: ' + r.slope;
    terminalRayOut.appendChild(p1);
    terminalRayOut.appendChild(p2);
    syncTerminalRayDesmos(graphCalculator, t, r.theta);
  }

  function onTerminalRayInput() {
    updateTerminalRayView(terminalRayIn.value);
  }

  function toggleTerminalRayStrip(calculator, relayout) {
    toggleAssistMode('ray', calculator, relayout);
  }

  function installTerminalRayStripHotkey(calculator, relayout) {
    window.addEventListener(
      'keydown',
      function (e) {
        if (e.repeat) return;
        if (e.key !== 'r' && e.key !== 'R') return;
        var cmdShiftR = e.metaKey && e.shiftKey && !e.altKey && !e.ctrlKey;
        var ctrlOptR = e.ctrlKey && e.altKey && !e.metaKey && !e.shiftKey;
        if (!cmdShiftR && !ctrlOptR) return;
        e.preventDefault();
        e.stopPropagation();
        toggleTerminalRayStrip(calculator, relayout);
      },
      true
    );
  }

  function evaluateToExact(raw) {
    var t = String(raw).trim();
    while (exactOut.firstChild) {
      exactOut.removeChild(exactOut.firstChild);
    }
    if (!t) {
      exactOut.classList.add('empty');
      exactOut.classList.remove('has-value');
      exactOut.setAttribute('aria-hidden', 'true');
      return;
    }
    exactOut.classList.remove('empty');
    exactOut.classList.add('has-value');
    exactOut.setAttribute('aria-hidden', 'false');

    var main = document.createElement('div');
    main.className = 'exact-main';
    if (!exactEvaluate || !window.math) {
      main.textContent = 'undefined';
    } else {
      main.textContent = exactEvaluate(t);
    }
    exactOut.appendChild(main);

    if (asymptoteApi && typeof asymptoteApi.asymptoteFormula === 'function') {
      try {
        var asym = asymptoteApi.asymptoteFormula(t);
        if (asym && asym !== 'none') {
          var sub = document.createElement('div');
          sub.className = 'asymptote-secondary';
          sub.setAttribute('title', 'Vertical asymptotes (tan / cot / sec / csc)');
          sub.textContent = asym;
          exactOut.appendChild(sub);
        }
      } catch (ignore) {}
    }
  }

  function onExactInput() {
    evaluateToExact(exactIn.value);
  }

  var exactListenersInstalled = false;
  function installExactStripInputListeners() {
    if (exactListenersInstalled) return;
    exactListenersInstalled = true;
    exactIn.addEventListener('input', onExactInput);
    exactIn.addEventListener('change', onExactInput);
    if (String(exactIn.value).trim()) {
      evaluateToExact(exactIn.value);
    }
  }

  var terminalRayListenersInstalled = false;
  function installTerminalRayStripInputListeners() {
    if (terminalRayListenersInstalled) return;
    terminalRayListenersInstalled = true;
    terminalRayIn.addEventListener('input', onTerminalRayInput);
    terminalRayIn.addEventListener('change', onTerminalRayInput);
    if (String(terminalRayIn.value).trim()) {
      updateTerminalRayView(terminalRayIn.value);
    }
  }

  var graphTrigListenersInstalled = false;
  function installGraphTrigStripInputListeners() {
    if (graphTrigListenersInstalled) return;
    graphTrigListenersInstalled = true;
    graphTrigIn.addEventListener('input', onGraphTrigInput);
    graphTrigIn.addEventListener('change', onGraphTrigInput);
    if (graphTrigRestriction) {
      graphTrigRestriction.addEventListener('input', onGraphTrigRestrictionInput);
      graphTrigRestriction.addEventListener('change', onGraphTrigRestrictionInput);
    }
    if (String(graphTrigIn.value).trim()) {
      updateGraphTrigView();
    }
  }

  var trigEqListenersInstalled = false;
  function installTrigEqStripInputListeners() {
    if (trigEqListenersInstalled || !trigEqIn) return;
    trigEqListenersInstalled = true;
    function onTrigEqInput() {
      updateTrigEqView();
    }
    trigEqIn.addEventListener('input', onTrigEqInput);
    trigEqIn.addEventListener('change', onTrigEqInput);
    if (trigEqInterval) {
      trigEqInterval.addEventListener('input', onTrigEqInput);
      trigEqInterval.addEventListener('change', onTrigEqInput);
    }
    if (String(trigEqIn.value).trim()) {
      updateTrigEqView();
    }
  }

  var trigIdListenersInstalled = false;
  function installTrigIdStripInputListeners() {
    if (trigIdListenersInstalled || !trigIdIn) return;
    trigIdListenersInstalled = true;
    function onTrigIdInput() {
      updateTrigIdentityView();
    }
    trigIdIn.addEventListener('input', onTrigIdInput);
    trigIdIn.addEventListener('change', onTrigIdInput);
    if (String(trigIdIn.value).trim()) {
      updateTrigIdentityView();
    }
  }

  var sumDiffListenersInstalled = false;
  function installSumDiffStripInputListeners() {
    if (sumDiffListenersInstalled || !sumDiffIn) return;
    sumDiffListenersInstalled = true;
    function onSumDiffInput() {
      updateSumDiffView();
    }
    sumDiffIn.addEventListener('input', onSumDiffInput);
    sumDiffIn.addEventListener('change', onSumDiffInput);
    if (String(sumDiffIn.value).trim()) {
      updateSumDiffView();
    }
  }

  var polarListenersInstalled = false;
  function installPolarStripInputListeners() {
    if (polarListenersInstalled || !polarIn) return;
    polarListenersInstalled = true;
    function onPolarInput() {
      updatePolarView();
    }
    polarIn.addEventListener('input', onPolarInput);
    polarIn.addEventListener('change', onPolarInput);
    if (String(polarIn.value).trim()) {
      updatePolarView();
    }
  }

  var rocListenersInstalled = false;
  function installRocStripInputListeners() {
    if (rocListenersInstalled || !rocIn) return;
    rocListenersInstalled = true;
    function onRocInput() {
      updateRocView();
    }
    rocIn.addEventListener('input', onRocInput);
    rocIn.addEventListener('change', onRocInput);
    if (String(rocIn.value).trim()) {
      updateRocView();
    }
  }

  var trigIneqListenersInstalled = false;
  function installTrigIneqStripInputListeners() {
    if (trigIneqListenersInstalled || !trigIneqIn) return;
    trigIneqListenersInstalled = true;
    function onTrigIneqInput() {
      updateTrigIneqView();
    }
    trigIneqIn.addEventListener('input', onTrigIneqInput);
    trigIneqIn.addEventListener('change', onTrigIneqInput);
    if (trigIneqInterval) {
      trigIneqInterval.addEventListener('input', onTrigIneqInput);
      trigIneqInterval.addEventListener('change', onTrigIneqInput);
    }
    if (String(trigIneqIn.value).trim()) {
      updateTrigIneqView();
    }
  }

  Promise.resolve()
    .then(function () { return loadScript('https://cdn.jsdelivr.net/npm/mathjs@12.4.3/lib/browser/math.min.js'); })
    .then(function () { return loadScript('exact-evaluate.js?' + LOCAL_JS_QUERY); })
    .then(function () {
      if (typeof createExactEvaluator !== 'function' || !window.math) {
        showError('Exact evaluator failed to load.', '');
        return Promise.reject(new Error('createExactEvaluator missing'));
      }
      exactEvaluate = createExactEvaluator(window.math);
    })
    .then(function () { return loadScript('asymptote.js?' + LOCAL_JS_QUERY); })
    .then(function () {
      var apiFn =
        (typeof createAsymptoteApi === 'function' && createAsymptoteApi) ||
        (typeof globalThis !== 'undefined' && typeof globalThis.createAsymptoteApi === 'function' && globalThis.createAsymptoteApi);
      if (!window.math) {
        console.warn('[graphing-calculator] asymptote: math missing');
      } else if (!apiFn) {
        console.warn('[graphing-calculator] asymptote: createAsymptoteApi missing (asymptote.js not loaded?)');
      } else {
        asymptoteApi = apiFn(window.math);
      }
      installExactStripInputListeners();
    })
    .then(function () {
      return loadScript('terminal-ray.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var trFn =
        (typeof createTerminalRayApi === 'function' && createTerminalRayApi) ||
        (typeof globalThis !== 'undefined' && globalThis.createTerminalRayApi);
      if (window.math && trFn) {
        terminalRayApi = trFn(window.math);
      } else {
        console.warn('[graphing-calculator] terminal-ray: createTerminalRayApi missing');
      }
      installTerminalRayStripInputListeners();
    })
    .then(function () {
      return loadScript('inverse-trig.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      return loadScript('trig-func-inverse.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      return loadScript('graph-trig.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var gtFn =
        (typeof createGraphTrigApi === 'function' && createGraphTrigApi) ||
        (typeof globalThis !== 'undefined' && globalThis.createGraphTrigApi);
      if (window.math && gtFn && asymptoteApi && asymptoteApi.asymptoteFormula) {
        graphTrigApi = gtFn(window.math, asymptoteApi.asymptoteFormula);
      } else if (window.math && gtFn) {
        graphTrigApi = gtFn(window.math);
      } else {
        console.warn('[graphing-calculator] graph-trig: init failed');
      }
      installGraphTrigStripInputListeners();
    })
    .then(function () {
      return loadScript('trig-equation.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var teFn =
        (typeof createTrigEquationApi === 'function' && createTrigEquationApi) ||
        (typeof globalThis !== 'undefined' &&
          typeof globalThis.createTrigEquationApi === 'function' &&
          globalThis.createTrigEquationApi);
      if (window.math && teFn) {
        trigEquationApi = teFn(window.math);
      } else {
        console.warn('[graphing-calculator] trig-equation: init failed');
      }
      installTrigEqStripInputListeners();
    })
    .then(function () {
      return loadScript('trig-identity-simplify.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var tiFn =
        (typeof createTrigIdentityApi === 'function' && createTrigIdentityApi) ||
        (typeof globalThis !== 'undefined' &&
          typeof globalThis.createTrigIdentityApi === 'function' &&
          globalThis.createTrigIdentityApi);
      if (window.math && tiFn) {
        trigIdentityApi = tiFn(window.math);
      } else {
        console.warn('[graphing-calculator] trig-identity: init failed');
      }
      installTrigIdStripInputListeners();
    })
    .then(function () {
      return loadScript('sum-diff-formulas.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var sdFn =
        (typeof createSumDiffApi === 'function' && createSumDiffApi) ||
        (typeof globalThis !== 'undefined' &&
          typeof globalThis.createSumDiffApi === 'function' &&
          globalThis.createSumDiffApi);
      if (sdFn) {
        sumDiffApi = sdFn();
      } else {
        console.warn('[graphing-calculator] sum-diff-formulas: init failed');
      }
      installSumDiffStripInputListeners();
    })
    .then(function () {
      return loadScript('polar-conversions.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var pFn =
        (typeof createPolarApi === 'function' && createPolarApi) ||
        (typeof globalThis !== 'undefined' &&
          typeof globalThis.createPolarApi === 'function' &&
          globalThis.createPolarApi);
      if (pFn) {
        polarApi = window.math ? pFn(window.math) : pFn();
      } else {
        console.warn('[graphing-calculator] polar-conversions: init failed');
      }
      installPolarStripInputListeners();
    })
    .then(function () {
      return loadScript('polar-rate-of-change.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var rocFn =
        (typeof createPolarRocApi === 'function' && createPolarRocApi) ||
        (typeof globalThis !== 'undefined' &&
          typeof globalThis.createPolarRocApi === 'function' &&
          globalThis.createPolarRocApi);
      if (rocFn && window.math) {
        polarRocApi = rocFn(window.math);
      } else {
        console.warn('[graphing-calculator] polar-rate-of-change: init failed');
      }
      installRocStripInputListeners();
    })
    .then(function () {
      return loadScript('trig-inequality.js?' + LOCAL_JS_QUERY);
    })
    .then(function () {
      var tiFn =
        (typeof createTrigInequalityApi === 'function' && createTrigInequalityApi) ||
        (typeof globalThis !== 'undefined' &&
          typeof globalThis.createTrigInequalityApi === 'function' &&
          globalThis.createTrigInequalityApi);
      if (tiFn && window.math) {
        trigIneqApi = tiFn(window.math);
      } else {
        console.warn('[graphing-calculator] trig-inequality: init failed');
      }
      installTrigIneqStripInputListeners();
    })
    .then(function () { return loadScript('https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6'); })
    .then(function () {
      if (typeof Desmos === 'undefined' || !Desmos.GraphingCalculator) {
        showError('Desmos script ran but <code>Desmos.GraphingCalculator</code> is missing.', '');
        return;
      }
      var calculator;
      try {
        calculator = Desmos.GraphingCalculator(calcElt, {
          keypad: true,
          expressions: true,
          settingsMenu: true,
          zoomButtons: true,
          expressionsTopbar: true,
          pointsOfInterest: true,
          trace: true,
          border: false,
          lockViewport: false,
          expressionsCollapsed: false,
          images: true,
          folders: true,
          notes: true,
          sliders: true,
          links: true,
          distributions: true,
          pasteTableData: true,
          pasteGraphLink: true,
          autosize: true,
          plotSingleVariableImplicitEquations: true,
          plotImplicits: true,
          plotInequalities: true
        });
      } catch (e) {
        showError('Calculator failed to start.', (e && e.stack) || (e && e.message) || e);
        return;
      }

      graphCalculator = calculator;
      if (terminalRayApi && String(terminalRayIn.value).trim()) {
        updateTerminalRayView(terminalRayIn.value);
      }
      if (graphTrigApi && String(graphTrigIn.value).trim()) {
        updateGraphTrigView();
      }
      if (trigEquationApi && trigEqIn && String(trigEqIn.value).trim()) {
        updateTrigEqView();
      }
      if (trigIdentityApi && trigIdIn && String(trigIdIn.value).trim()) {
        updateTrigIdentityView();
      }
      if (sumDiffApi && sumDiffIn && String(sumDiffIn.value).trim()) {
        updateSumDiffView();
      }
      if (polarApi && polarIn && String(polarIn.value).trim()) {
        updatePolarView();
      }
      if (polarRocApi && rocIn && String(rocIn.value).trim()) {
        updateRocView();
      }
      if (trigIneqApi && trigIneqIn && String(trigIneqIn.value).trim()) {
        updateTrigIneqView();
      }

      function relayout() {
        try {
          if (calculator && typeof calculator.resize === 'function') calculator.resize();
        } catch (ignore) {}
      }
      installExactStripHotkey(calculator, relayout);
      installTerminalRayStripHotkey(calculator, relayout);
      installGraphTrigStripHotkey(calculator, relayout);
      installTrigEqStripHotkey(calculator, relayout);
      installTrigIdStripHotkey(calculator, relayout);
      installSumDiffStripHotkey(calculator, relayout);
      installPolarStripHotkey(calculator, relayout);
      installRocStripHotkey(calculator, relayout);
      installTrigIneqStripHotkey(calculator, relayout);
      installPanicHotkey(calculator, relayout);
      wireAssistDock(calculator, relayout);
      window.addEventListener('resize', relayout);
      requestAnimationFrame(function () {
        relayout();
        setTimeout(relayout, 0);
      });
    })
    .catch(function (e) {
      showError('Could not load a required script.', (e && e.message) || String(e));
    });
})();
</script>
